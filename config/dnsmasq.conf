# PXE Aurora Server - dnsmasq configuration
# DHCP + TFTP + iPXE chainloading for BIOS and UEFI

# Interface binding
interface=enp3s0
bind-dynamic

# DHCP range
dhcp-range=192.168.200.150,192.168.200.250,12h

# DHCP options: gateway and DNS
dhcp-option=3,192.168.200.1
dhcp-option=6,192.168.200.1

# Architecture detection via DHCP Option 93
dhcp-match=set:bios,option:client-arch,0
dhcp-match=set:efi64,option:client-arch,7
dhcp-match=set:efi64,option:client-arch,9

# iPXE anti-loop detection
dhcp-userclass=set:ipxe,iPXE

# Boot file selection by architecture
dhcp-boot=tag:bios,undionly.kpxe
dhcp-boot=tag:efi64,shimx64.efi
dhcp-boot=tag:ipxe,http://192.168.200.115:8080/boot.ipxe

# TFTP configuration
enable-tftp
tftp-root=/tftpboot
